## LaTeX 公式

### 行内公式 (多种语法)

- 美元符号: $E = mc^2$ 和 $x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$
- 反斜杠括号: \( \alpha + \beta = \gamma \) 和 \( \sin^2\theta + \cos^2\theta = 1 \)

### 行间公式 (多种语法)

美元符号:
$$
\int_{-\infty}^{\infty} e^{-x^2} dx = \sqrt{\pi}
$$

反斜杠方括号:
\[
\sum_{i=1}^{n} i = \frac{n(n+1)}{2}
\]

### 更多公式

- 二次公式: $x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$
- 欧拉恒等式: $e^{i\pi} + 1 = 0$
- 带下标的公式: $F_n = F_{n-1} + F_{n-2}$
- 带上标的公式: $E = mc^2$
- 复杂公式: $\sum_{i=1}^{n} i = \frac{n(n+1)}{2}$
- 嵌套在其他 Markdown 语法中 $a_{ij}^{(k)}$。
- 行间复杂公式:
$$
\oint_C \vec{B} \cdot \mathrm{d}\vec{l} = \mu_0 \left( I_\text{enc} + \varepsilon_0 \frac{\mathrm{d} \Phi_E}{\mathrm{d}t} \right)
$$
- 使用 \[ \] 的行间公式:
\[
\mathcal{L} = \frac{1}{4\pi} \left[ \frac{G M}{r^2} \right]
\]

        <div id="output"></div>

<script>
    // 辅助函数：转义HTML特殊字符（用于行内代码等，不用于代码块）
    function escapeHtml(unsafe) {
        if (typeof unsafe !== 'string') {
             console.warn('escapeHtml received non-string input:', typeof unsafe, unsafe);
             return '';
        }
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "<")
            .replace(/>/g, ">")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // --- 核心修复：完全绕过 marked 的代码块解析 ---

    // 1. 定义代码块的正则表达式
    const codeBlockRegex = /```([\s\S]*?)\n([\s\S]*?)```/g; // 匹配 ```lang\ncontent\n```

    // 配置 Marked 以启用 GFM、breaks，并使用默认渲染器（不重写 code 方法）
    marked.setOptions({
        gfm: true,
        breaks: true,
        smartLists: true,
        smartypants: true,
        mangle: false,
        headerIds: false,
        renderer: new marked.Renderer(), // 使用默认渲染器
    });

    // 正则表达式，用于匹配多种 LaTeX 公式语法
    const blockRegex = [
        /\$\$([\s\S]+?)\$\$/g,
        /\\\[\s*([\s\S]+?)\s*\\\]/g
    ];
    
    const inlineRegex = [
        /\\\(\s*([^$]+?)\s*\\\)/g,
        /\$([^\$]+?)\$/g
    ];

    function render() {
        const inputText = document.getElementById('input').value;
        const outputDiv = document.getElementById('output');

        try {
            let text = inputText;
            // --- 1. 提取代码块 ---
            const codeBlockPlaceholders = [];
            let codeBlockPlaceholderIndex = 0;

            text = text.replace(codeBlockRegex, (match, language, content) => {
                const lang = language.trim();
                const placeholder = `<!--CODE_BLOCK_${codeBlockPlaceholderIndex}-->`;
                // 存储原始语言和内容，以便后续处理
                codeBlockPlaceholders[codeBlockPlaceholderIndex] = { lang, content: content.trimEnd() };
                codeBlockPlaceholderIndex++;
                return placeholder;
            });

            // --- 2. 提取 LaTeX 公式 ---
            const latexPlaceholders = [];
            let latexPlaceholderIndex = 0;

            blockRegex.forEach((regex, idx) => {
                text = text.replace(regex, (match, content) => {
                    const placeholder = `<!--LATEX_BLOCK_${latexPlaceholderIndex}-->`;
                    latexPlaceholders[latexPlaceholderIndex] = { type: 'block', content: content.trim() };
                    latexPlaceholderIndex++;
                    return placeholder;
                });
            });

            inlineRegex.forEach((regex, idx) => {
                text = text.replace(regex, (match, content) => {
                    const placeholder = `<!--LATEX_INLINE_${latexPlaceholderIndex}-->`;
                    latexPlaceholders[latexPlaceholderIndex] = { type: 'inline', content: content.trim() };
                    latexPlaceholderIndex++;
                    return placeholder;
                });
            });

            // --- 3. 使用 Marked 解析 Markdown (不含代码块和 LaTeX) ---
            let parsedHTML = marked.parse(text);

            // 将解析后的HTML设置到输出区域
            outputDiv.innerHTML = parsedHTML;

            // --- 4. 后处理：将代码块占位符替换为渲染后的代码块 ---
            codeBlockPlaceholders.forEach((codeBlock, index) => {
                const commentPlaceholder = `CODE_BLOCK_${index}`;
                const commentNode = findCommentNode(outputDiv, commentPlaceholder);
                if (commentNode) {
                    // --- 关键修复：不再对代码内容进行 HTML 转义 ---
                    // 代码块内容应原样显示
                    const rawContent = codeBlock.content;

                    const codeElement = document.createElement('code');
                    codeElement.className = `language-${codeBlock.lang}`;
                    // 使用 textContent 来设置内容，这会自动处理特殊字符，但不会将其作为 HTML 解析
                    // 这是安全的，因为它是文本节点，不是 HTML
                    codeElement.textContent = rawContent;

                    const preElement = document.createElement('pre');
                    // 添加语言标签
                    if (codeBlock.lang) {
                        const langSpan = document.createElement('span');
                        langSpan.className = 'code-language';
                        langSpan.textContent = codeBlock.lang;
                        preElement.appendChild(langSpan);
                    }
                    preElement.appendChild(codeElement);

                    commentNode.parentNode.insertBefore(preElement, commentNode);
                    commentNode.parentNode.removeChild(commentNode);
                }
            });

            // --- 5. 后处理：将 LaTeX 占位符替换为渲染标记 ---
            latexPlaceholders.forEach((latex, index) => {
                const commentPlaceholder = `LATEX_${latex.type.toUpperCase()}_${index}`;
                const commentNode = findCommentNode(outputDiv, commentPlaceholder);
                if (commentNode) {
                    let newElement;
                    if (latex.type === 'inline') {
                        newElement = document.createElement('span');
                        newElement.className = 'math inline';
                        newElement.textContent = `\\(${latex.content}\\)`;
                    } else {
                        newElement = document.createElement('div');
                        newElement.className = 'math block';
                        newElement.textContent = `\\[${latex.content}\\]`;
                    }
                    commentNode.parentNode.insertBefore(newElement, commentNode);
                    commentNode.parentNode.removeChild(commentNode);
                }
            });

            // --- 6. 强制 MathJax 重新处理 ---
            if (typeof MathJax !== 'undefined') {
                MathJax.typesetPromise([outputDiv]).catch(function (err) {
                    console.error('MathJax 渲染错误:', err);
                });
            } else {
                console.warn('MathJax 未加载，LaTeX 公式将不会被渲染。');
            }
        } catch (error) {
            console.error('渲染过程中发生错误:', error);
            outputDiv.innerHTML = '<p style="color:red;">渲染错误: ' + error.message + '</p>';
        }
    }

    // 辅助函数：在 DOM 树中查找指定内容的注释节点
    function findCommentNode(node, content) {
        if (node.nodeType === Node.COMMENT_NODE && node.textContent === content) {
            return node;
        }
        if (node.hasChildNodes()) {
            for (let child of node.childNodes) {
                const found = findCommentNode(child, content);
                if (found) return found;
            }
        }
        return null;
    }

    window.onload = function() {
        render();
    };
</script>
