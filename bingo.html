<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终极自定义 BINGO 引擎</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            /* 基础色彩与样式 */
            --card-bg: #ffffff;
            --grid-border: #000000;
            --cell-bg: #ffffff;
            --text-color: #000000;
            --highlight-bg: #ffcccc;
            --font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            --border-radius: 0px;
            --border-width: 3px;
            --border-style: solid;
            
            /* 排版与形状变量 */
            --grid-cols: 5;
            --cell-gap: 0px;
            --cell-ratio: 1; /* 1为正方形，1.5为长方形等 */
            --card-width: 800px;
        }

        body {
            font-family: sans-serif; background-color: #e9ecef;
            display: flex; margin: 0; min-height: 100vh;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

        /* 左侧控制台 */
        .sidebar {
            width: 340px; background: #fff; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }
        .sidebar h2 { margin-top: 0; font-size: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* 控件分组样式 */
        .control-section { border: 1px solid #eee; padding: 12px; border-radius: 8px; background: #fafafa; display: flex; flex-direction: column; gap: 10px;}
        .control-section-title { font-size: 13px; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-weight: bold; font-size: 13px; color: #333; }
        .control-group input[type="number"], .control-group select, .control-group input[type="color"] {
            width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .row-col-inputs { display: flex; gap: 10px; }
        
        .btn {
            padding: 12px; font-size: 15px; cursor: pointer; border: none; border-radius: 6px;
            color: white; font-weight: bold; transition: all 0.2s; text-align: center;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #007bff; }
        .btn-success { background-color: #28a745; }
        .btn-warning { background-color: #fd7e14; }
        .btn-secondary { background-color: #6c757d; }
        .btn-outline { background-color: transparent; border: 2px dashed #007bff; color: #007bff; padding: 8px; font-size: 13px; }
        .btn-outline:hover { background-color: #e6f2ff; }

        /* 右侧预览区 */
        .preview-area {
            flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto;
        }

        /* 卡片主体 */
        .bingo-card {
            background-color: var(--card-bg); width: var(--card-width); max-width: 95vw;
            padding: 40px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            font-family: var(--font-family); transition: width 0.3s ease, background-color 0.3s ease;
            box-sizing: border-box; position: relative;
        }

        /* 头部和尾部文本区 */
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: clamp(32px, 5vw, 64px); margin: 0 0 10px 0; color: var(--text-color); outline: none; font-weight: 900; word-break: break-all;}
        .subtitle-container { padding-bottom: 10px; margin-bottom: 20px; }
        .extra-text { font-size: 18px; margin: 8px 0; color: var(--text-color); font-weight: bold; outline: none; word-break: break-all; }
        .footer { text-align: center; margin-top: 20px; }
        .footer-text { color: var(--text-color); opacity: 0.8; font-size: 16px; outline: none; display: inline-block; margin: 5px 0;}

        /* 分割线独立出来，只在连体网格模式下显示 */
        .divider-line { height: var(--border-width); background-color: var(--grid-border); margin-bottom: 20px; transition: all 0.2s;}

        /* 网格核心引擎 */
        .grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), 1fr);
            width: 100%; transition: all 0.3s;
        }

        /* 单元格通用属性 */
        .cell {
            aspect-ratio: var(--cell-ratio); display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; cursor: pointer; transition: background-color 0.2s, transform 0.1s;
            padding: 10px; position: relative; background-color: var(--cell-bg);
            overflow: hidden; /* 防止文字溢出 */
        }
        .cell-content {
            width: 100%; max-height: 100%; text-align: center; font-weight: bold;
            color: var(--text-color); outline: none; word-break: break-word; line-height: 1.3;
            position: relative; z-index: 2;
        }

        /* === 形状模式 1: 经典连体 (Seamless) === */
        .grid.seamless {
            border-top: var(--border-width) var(--border-style) var(--grid-border);
            border-left: var(--border-width) var(--border-style) var(--grid-border);
            gap: 0;
        }
        .grid.seamless .cell {
            border-right: var(--border-width) var(--border-style) var(--grid-border);
            border-bottom: var(--border-width) var(--border-style) var(--grid-border);
        }

        /* === 形状模式 2: 独立方块/圆角 (Separated) === */
        .grid.separated { border: none; gap: var(--cell-gap); }
        .grid.separated .cell {
            border: var(--border-width) var(--border-style) var(--grid-border);
            border-radius: var(--border-radius);
        }
        
        /* === 形状模式 3: 圆形/椭圆 (Circle) === */
        .grid.circle { border: none; gap: var(--cell-gap); }
        .grid.circle .cell {
            border: var(--border-width) var(--border-style) var(--grid-border);
            border-radius: 50%;
        }

        /* === 形状模式 4: 菱形 (Rhombus) === */
        .grid.rhombus { border: none; gap: var(--cell-gap); }
        .grid.rhombus .cell {
            border: none; /* Clip-path 会裁掉原生的边框，所以隐藏 */
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            /* 用阴影模拟边框 */
            box-shadow: inset 0 0 0 var(--border-width) var(--grid-border); 
        }

        /* 盖章系统 */
        .stamp-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: clamp(30px, 4vw, 80px); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1; pointer-events: none; color: #ff3b30;
        }
        .cell.active { background-color: var(--highlight-bg); }
        .cell.active .stamp-overlay { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }

        /* ==========================================
           全 局 编 辑 高 亮 模 式 (神级功能)
           ========================================== */
        body.edit-mode [contenteditable="true"] {
            outline: 3px dashed #ff9800 !important;
            outline-offset: 4px;
            background-color: rgba(255, 152, 0, 0.15) !important;
            border-radius: 4px;
            min-height: 1em;
            transition: all 0.2s;
            cursor: text;
        }
        /* 格子内的文字特殊处理，防止撑破 */
        body.edit-mode .cell-content[contenteditable="true"] { outline-offset: -2px; }
        
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; max-height: 40vh; box-sizing: border-box; }
            .preview-area { padding: 10px; }
            .bingo-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- 左侧控制台 -->
    <div class="sidebar">
        <h2>⚙️ 超级自定义控制台</h2>
        <div class="control-section" style="border: 2px solid #007bff; background: #e6f2ff;">
            <div class="control-section-title" style="color: #007bff;">🎨 模板库 (40+ 预设)</div>
            <div class="control-group">
                <label>选择模板主题</label>
                <select id="templateSelect" onchange="previewTemplate()">
                    <option value="">-- 请选择一个模板 --</option>
                    <option value="0">🎮 年度游戏大赏</option>
                    <option value="1">🎬 电影观影清单</option>
                    <option value="2">📚 读书挑战</option>
                    <option value="3">💪 健身打卡</option>
                    <option value="4">📖 学习自律</option>
                    <option value="5">✈️ 旅行目的地</option>
                    <option value="6">🍜 美食探店</option>
                    <option value="7">💻 程序员日常</option>
                    <option value="8">🏢 社畜生存</option>
                    <option value="9">💕 恋爱甜蜜</option>
                    <option value="10">🎉 周末活动</option>
                    <option value="11">📷 摄影挑战</option>
                    <option value="12">🎵 音乐品味</option>
                    <option value="13">🐱 宠物日常</option>
                    <option value="14">✍️ 手账打卡</option>
                    <option value="15">☕ 咖啡品鉴</option>
                    <option value="16">🌿 极简生活</option>
                    <option value="17">🎌 动漫追番</option>
                    <option value="18">💄 化妆护肤</option>
                    <option value="19">🏠 居家整理</option>
                    <option value="20">🧘 冥想正念</option>
                    <option value="21">🌱 植物养护</option>
                    <option value="22">🍰 烘焙挑战</option>
                    <option value="23">🌍 语言学习</option>
                    <option value="24">💰 理财计划</option>
                    <option value="25">👗 穿搭挑战</option>
                    <option value="26">🌙 夜生活</option>
                    <option value="27">⛺ 露营清单</option>
                    <option value="28">🌊 海洋/潜水</option>
                    <option value="29">❄️ 冬季活动</option>
                    <option value="30">☀️ 夏季活动</option>
                    <option value="31">👻 恐怖游戏</option>
                    <option value="32">🎮 独立游戏</option>
                    <option value="33">🕹️ 复古游戏</option>
                    <option value="34">🌃 赛博朋克</option>
                    <option value="35">⚫ 极简黑白</option>
                    <option value="36">🧡 暖色温馨</option>
                    <option value="37">🔵 冷色科技</option>
                    <option value="38">🔴 圆形可爱</option>
                    <option value="39">💎 菱形艺术</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="applyTemplate()" style="margin-top: 5px;">✨ 应用选中模板</button>
            <div id="templatePreview" style="font-size: 12px; color: #666; margin-top: 8px; line-height: 1.4;"></div>
        </div>

        
        <button id="modeBtn" class="btn btn-success" onclick="toggleMode()">🎲 切换：当前为【打卡模式】</button>
        <button class="btn btn-secondary" onclick="resetGrid()">🧹 清空所有盖章</button>
        
        <div class="control-section">
            <div class="control-section-title">无限网格与比例</div>
            <div class="row-col-inputs">
                <div class="control-group" style="flex:1"><label>行数 (Rows)</label><input type="number" id="gridRows" value="5" min="1" onchange="generateGrid()"></div>
                <div class="control-group" style="flex:1"><label>列数 (Cols)</label><input type="number" id="gridCols" value="5" min="1" onchange="generateGrid()"></div>
            </div>
            <div class="control-group">
                <label>格子长宽比 (左:高 右:扁)</label>
                <input type="range" id="cellRatio" min="30" max="250" value="100" oninput="applyLayoutSettings()">
            </div>
            <div class="control-group">
                <label>整体卡片宽度调整 (适配长短图)</label>
                <input type="range" min="400" max="1800" value="800" oninput="document.documentElement.style.setProperty('--card-width', this.value + 'px'); adjustAllCells();">
            </div>
        </div>

        <div class="control-section">
            <div class="control-section-title">排版与多变形状</div>
            <div class="control-group">
                <label>网格布局形态</label>
                <select id="layoutStyle" onchange="applyLayoutSettings()">
                    <option value="seamless">经典连体网格 (无缝接合)</option>
                    <option value="separated">独立方块/圆角块</option>
                    <option value="circle">纯正圆形 / 椭圆形</option>
                    <option value="rhombus">创意菱形 (钻石形)</option>
                </select>
            </div>
            <div class="control-group">
                <label>格子间距 (Gap - 仅独立形态有效)</label>
                <input type="range" id="gridGap" min="0" max="40" value="10" oninput="applyLayoutSettings()">
            </div>
        </div>

        <div class="control-section">
            <div class="control-section-title">自由排版附加组件</div>
            <button class="btn btn-outline" onclick="addExtraText('extra-header-texts')">➕ 在标题下方添加一行副标题</button>
            <button class="btn btn-outline" onclick="addExtraText('extra-footer-texts')">➕ 在底部添加一行注脚</button>
        </div>

        <div class="control-section">
            <div class="control-section-title">视觉微调与印章</div>
            <div class="control-group">
                <label>印章图案</label>
                <select id="stampStyle" onchange="updateStampStyle()">
                    <option value="color">仅底色高亮 (无图案)</option>
                    <option value="⭕">⭕ 红色圈圈</option>
                    <option value="❌">❌ 红色大叉</option>
                    <option value="🐾">🐾 宠物爪印</option>
                    <option value="💖">💖 爱心标记</option>
                    <option value="💯">💯 满分好评</option>
                    <option value="✔️">✔️ 绿色对勾</option>
                </select>
            </div>
            <div class="control-group"><label>圆角大小</label><input type="range" min="0" max="50" value="0" oninput="document.documentElement.style.setProperty('--border-radius', this.value + 'px')"></div>
            <div class="control-group"><label>边框粗细</label><input type="range" min="0" max="10" value="3" oninput="document.documentElement.style.setProperty('--border-width', this.value + 'px')"></div>
            <div class="row-col-inputs">
                <div class="control-group"><label>卡片底色</label><input type="color" value="#ffffff" oninput="document.documentElement.style.setProperty('--card-bg', this.value)"></div>
                <div class="control-group"><label>格子底色</label><input type="color" value="#ffffff" oninput="document.documentElement.style.setProperty('--cell-bg', this.value)"></div>
                <div class="control-group"><label>线条颜色</label><input type="color" value="#000000" oninput="document.documentElement.style.setProperty('--grid-border', this.value)"></div>
            </div>
        </div>

        <button class="btn btn-primary" style="margin-top: 10px;" onclick="downloadImage()">📸 渲染并保存为图片</button>
    </div>

    <!-- 右侧预览区 -->
    <div class="preview-area">
        <div class="bingo-card" id="bingo-card">
            <div class="header">
                <h1 id="main-title">年度游戏 BINGO 大赏</h1>
                <div class="subtitle-container" id="extra-header-texts">
                    <div class="extra-text">(看看你今年受过多少苦/享受过多少神作)</div>
                </div>
                <!-- 仅在连体模式下显示的主分割线 -->
                <div class="divider-line" id="main-divider"></div>
            </div>

            <div class="grid seamless" id="grid"></div>

            <div class="footer" id="extra-footer-texts">
                <div class="footer-text">(清空文字即可删除这一行)</div>
            </div>
        </div>
    </div>

    <script>
        let isEditMode = false;
        let currentStamp = 'color';

        // 核心：根据行列重新生成网格
        function generateGrid() {
            const rows = parseInt(document.getElementById('gridRows').value) || 1;
            const cols = parseInt(document.getElementById('gridCols').value) || 1;
            const gridElement = document.getElementById('grid');
            
            // 设置 CSS 变量
            document.documentElement.style.setProperty('--grid-cols', cols);
            
            // 保留原有文字（如果扩充格子，旧文字不丢，新格子为空）
            const existingCells = Array.from(document.querySelectorAll('.cell-content')).map(el => el.innerText);
            gridElement.innerHTML = '';

            const totalCells = rows * cols;
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                const content = document.createElement('div');
                content.className = 'cell-content';
                content.innerText = existingCells[i] !== undefined ? existingCells[i] : `内容 ${i+1}`;
                
                // 监听输入，实时调整大小
                content.addEventListener('input', () => adjustFontSize(cell));

                // 印章层
                const stamp = document.createElement('div');
                stamp.className = 'stamp-overlay';
                stamp.innerText = currentStamp === 'color' ? '' : currentStamp;
                if(currentStamp === '✔️') stamp.style.color = '#28a745';

                cell.appendChild(content);
                cell.appendChild(stamp);

                // 点击盖章逻辑
                cell.addEventListener('click', function() {
                    if (!isEditMode) this.classList.toggle('active');
                });
                gridElement.appendChild(cell);
            }

            // 如果处于编辑模式，新生成的格子也要赋可编辑属性
            if (isEditMode) {
                document.querySelectorAll('.cell-content').forEach(el => el.setAttribute('contenteditable', 'true'));
            }

            setTimeout(adjustAllCells, 50);
        }

        // 核心：应用形状与排版设置
        function applyLayoutSettings() {
            const style = document.getElementById('layoutStyle').value;
            const gap = document.getElementById('gridGap').value;
            const ratioSlider = document.getElementById('cellRatio').value;
            
            const root = document.documentElement.style;
            const grid = document.getElementById('grid');
            const divider = document.getElementById('main-divider');

            // 转换 ratio (100 = 1:1, 200 = 2:1)
            root.setProperty('--cell-ratio', ratioSlider / 100);
            
            // 切换形状 Class
            grid.className = `grid ${style}`;

            // 根据布局形态动态调整 CSS 变量
            if (style === 'seamless') {
                root.setProperty('--cell-gap', '0px');
                divider.style.opacity = '1';
            } else {
                root.setProperty('--cell-gap', gap + 'px');
                divider.style.opacity = '0'; // 独立块模式下隐藏主分割线更好看
            }

            adjustAllCells();
        }

        // 字体自适应引擎
        function adjustFontSize(cell) {
            const content = cell.querySelector('.cell-content');
            if (!content) return;
            let currentSize = 40; 
            const minSize = 10;   
            content.style.fontSize = currentSize + 'px';
            
            // 考虑边距，防止贴边
            const padding = 12; 
            while ((content.scrollHeight > cell.clientHeight - padding || content.scrollWidth > cell.clientWidth - padding) && currentSize > minSize) {
                currentSize -= 1; 
                content.style.fontSize = currentSize + 'px';
            }
        }
        function adjustAllCells() {
            document.querySelectorAll('.cell').forEach(adjustFontSize);
        }

        // 添加自由文本
        function addExtraText(containerId) {
            const container = document.getElementById(containerId);
            const newElement = document.createElement('div');
            // 根据位置赋予不同基础样式
            newElement.className = containerId.includes('header') ? 'extra-text' : 'footer-text';
            newElement.innerText = "✏️ 新添加的自定义文本 (清空即可删除)";
            
            if (isEditMode) newElement.setAttribute('contenteditable', 'true');
            
            // 失去焦点且内容为空时自动删除
            newElement.addEventListener('blur', function() {
                if (this.innerText.trim() === '') this.remove();
            });
            
            container.appendChild(newElement);
        }

        // 全局编辑/打卡模式切换
        function toggleMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('modeBtn');
            const editables = [
                ...document.querySelectorAll('.cell-content'), 
                document.getElementById('main-title'),
                ...document.querySelectorAll('.extra-text'),
                ...document.querySelectorAll('.footer-text')
            ];

            if (isEditMode) {
                document.body.classList.add('edit-mode');
                btn.innerHTML = "📝 切换：当前为【编辑模式】<br><small>点击任意高亮框修改，清空文本可删除元素</small>";
                btn.className = "btn btn-warning";
                editables.forEach(el => el.setAttribute('contenteditable', 'true'));
                resetGrid(); // 编辑时取消所有红底高亮，防止视觉混淆
            } else {
                document.body.classList.remove('edit-mode');
                btn.innerHTML = "🎲 切换：当前为【打卡模式】<br><small>点击格子即可盖章</small>";
                btn.className = "btn btn-success";
                
                // 退出编辑时，清理空元素并重新排版
                document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                    el.setAttribute('contenteditable', 'false');
                    el.innerText = el.innerText.trim();
                    if (el.innerText === '' && (el.classList.contains('extra-text') || el.classList.contains('footer-text'))) {
                        el.remove();
                    }
                });
                adjustAllCells();
            }
        }

        function resetGrid() {
            document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('active'));
        }

        function updateStampStyle() {
            currentStamp = document.getElementById('stampStyle').value;
            document.querySelectorAll('.stamp-overlay').forEach(stamp => {
                stamp.innerText = currentStamp === 'color' ? '' : currentStamp;
                if(currentStamp === '✔️') stamp.style.color = '#28a745';
                else stamp.style.color = '#ff3b30'; 
            });
        }

        function downloadImage() {
            const wasEditMode = isEditMode;
            if (wasEditMode) toggleMode(); // 强制退出编辑模式，去除高亮虚线框
            
            const card = document.getElementById('bingo-card');
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerText;
            btn.innerText = "⏳ 正在生成超清大图...";
            btn.disabled = true;

        function previewTemplate() {
            const idx = document.getElementById('templateSelect').value;
            const preview = document.getElementById('templatePreview');
            if (idx === '') {
                preview.innerHTML = '';
                return;
            }
            const t = TEMPLATES[idx];
            preview.innerHTML = `<strong>${t.name}</strong><br>
                📐 ${t.rows}×${t.cols} | 🎨 ${t.style.layoutStyle} | 🖌️ ${t.style.stampStyle}<br>
                <span style="opacity:0.7">${t.subtitle}</span>`;
        }

        function applyTemplate() {
            const idx = document.getElementById('templateSelect').value;
            if (idx === '') {
                alert('请先选择一个模板！');
                return;
            }
            const t = TEMPLATES[idx];
            const s = t.style;

            // 如果当前在编辑模式，先退出
            if (isEditMode) toggleMode();

            // 1. 设置行列
            document.getElementById('gridRows').value = t.rows;
            document.getElementById('gridCols').value = t.cols;

            // 2. 设置文本内容
            document.getElementById('main-title').innerText = t.title;

            // 清空并设置副标题
            const headerContainer = document.getElementById('extra-header-texts');
            headerContainer.innerHTML = '';
            if (t.subtitle) {
                const sub = document.createElement('div');
                sub.className = 'extra-text';
                sub.innerText = t.subtitle;
                headerContainer.appendChild(sub);
            }

            // 清空并设置底部
            const footerContainer = document.getElementById('extra-footer-texts');
            footerContainer.innerHTML = '';
            if (t.footer) {
                const foot = document.createElement('div');
                foot.className = 'footer-text';
                foot.innerText = t.footer;
                footerContainer.appendChild(foot);
            }

            // 3. 生成网格并填充内容
            generateGrid();
            const cells = document.querySelectorAll('.cell-content');
            t.cells.forEach((text, i) => {
                if (cells[i]) cells[i].innerText = text;
            });

            // 4. 应用样式变量
            const root = document.documentElement.style;
            root.setProperty('--cell-ratio', s.cellRatio / 100);
            root.setProperty('--card-width', s.cardWidth + 'px');
            root.setProperty('--cell-gap', s.gridGap + 'px');
            root.setProperty('--border-radius', s.borderRadius + 'px');
            root.setProperty('--border-width', s.borderWidth + 'px');
            root.setProperty('--card-bg', s.cardBg);
            root.setProperty('--cell-bg', s.cellBg);
            root.setProperty('--grid-border', s.gridBorder);
            root.setProperty('--text-color', s.textColor);
            root.setProperty('--highlight-bg', s.highlightBg);
            root.setProperty('--font-family', s.fontFamily);

            // 5. 应用布局样式
            document.getElementById('layoutStyle').value = s.layoutStyle;
            document.getElementById('gridGap').value = s.gridGap;
            document.getElementById('cellRatio').value = s.cellRatio;

            // 同步卡片宽度滑块（如果有对应的input）
            const widthInputs = document.querySelectorAll('input[type="range"]');
            widthInputs.forEach(inp => {
                if (inp.min === '400' && inp.max === '1800') inp.value = s.cardWidth;
                if (inp.min === '0' && inp.max === '50') inp.value = s.borderRadius;
                if (inp.min === '0' && inp.max === '10') inp.value = s.borderWidth;
            });

            // 6. 应用印章样式
            document.getElementById('stampStyle').value = s.stampStyle;
            updateStampStyle();

            // 7. 应用布局
            applyLayoutSettings();

            // 8. 调整字体
            setTimeout(adjustAllCells, 100);

            // 提示
            const btn = document.querySelector('.control-section button[onclick="applyTemplate()"]');
            const originalText = btn.innerText;
            btn.innerText = '✅ 已应用！';
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        window.onload = () => {
            generateGrid();
        };
    </script>
